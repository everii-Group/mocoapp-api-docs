domain: everii-group.github.io
title: MOCO API docs
description: mocoapp.com REST API documentation
theme: just-the-docs

url: https://everii-group.github.io
baseurl: /mocoapp-api-docs
logo: "https://www.mocoapp.com/custom-assets/logo_moco.svg"

color_scheme: moco

aux_links: # remove if you don't want this link to appear on your pages
  Github: https://github.com/everii-group/mocoapp-api-docs

nav_external_links:
  - title: Open API
    url: https://docs.mocoapp.com/api/docs/v1
    opens_in_new_tab: true
    hide_icon: false

heading_anchors: true
kramdown:
  toc_levels: "2,3"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: yellow

plugins:
  - jekyll-default-layout

# Footer "Edit this page on GitHub" link text
gh_edit_link: true # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/everii-group/mocoapp-api-docs" # the github URL for your repo
gh_edit_branch: "master" # the branch that your docs is served from
gh_edit_view_mode: "tree" # "tree" or "edit" if you want the user to jump into the editor immediately
